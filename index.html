<!DOCTYPE html>
<html>
<head>
    <title>A1 Data Test</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f4f4; }
        .debug-box { background: #222; color: #39FF14; padding: 20px; margin: 20px auto; width: 80%; border-radius: 8px; text-align: left; font-family: monospace; }
        .result-box { font-size: 48px; font-weight: bold; color: #001f3f; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Cell A1 Connection Test</h1>
    
    <div id="status">Status: Initializing...</div>

    <div class="result-box">
        Value in A1: <span id="a1-value">--</span>
    </div>

    <div class="debug-box" id="log">
        LOG START:
    </div>

<script>
    var logEl = document.getElementById('log');
    function log(msg) {
        logEl.innerHTML += "<br>> " + msg;
    }

    // Your confirmed Spreadsheet ID
    var SHEET_ID = "1gN_nb8Hjggg9hjawsTu8j6WI9sfFqGcZRYYzacjGMaE";
    var URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/export?format=csv&gid=0";

    function testA1() {
        log("Fetching data from Google...");
        
        fetch(URL + "&t=" + new Date().getTime())
            .then(function(res) {
                log("Server response received: " + res.status);
                if (!res.ok) throw new Error("Access Denied or Private Sheet");
                return res.text();
            })
            .then(function(data) {
                log("Data received. Length: " + data.length);
                
                // Get the very first piece of data before the first comma
                var rows = data.split('\n');
                var firstRow = rows[0].split(',');
                var a1 = firstRow[0].replace(/"/g, "").trim();
                
                log("Extracted A1: " + a1);
                document.getElementById('a1-value').innerText = a1;
                document.getElementById('status').innerText = "Status: Success!";
            })
            .catch(function(err) {
                log("ERROR: " + err.message);
                document.getElementById('status').innerText = "Status: Connection Failed";
                document.getElementById('a1-value').innerText = "Error";
            });
    }

    testA1();
</script>

</body>
</html>
