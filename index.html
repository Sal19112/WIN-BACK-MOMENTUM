<script>
    // Link to your new sheet export
    var SHEET_ID = "1gN_nb8Hjggg9hjawsTu8j6WI9sfFqGcZRYYzacjGMaE";
    var FINAL_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/export?format=csv&gid=0";

    function refreshData() {
        // Adding a timestamp to the URL to force Google to give us FRESH data
        var cacheBuster = FINAL_URL + "&t=" + new Date().getTime();

        fetch(cacheBuster)
            .then(function(res) { return res.text(); })
            .then(function(csvText) {
                // Split rows and handle potential carriage returns
                var rows = csvText.split(/\r?\n/).map(function(row) {
                    return row.split(',').map(function(cell) {
                        return cell.replace(/^"(.*)"$/, '$1').trim();
                    });
                });

                // --- DEBUG: If you still see 0, press F12 and look at this log ---
                console.log("Raw Data Received:", rows);

                // Day Count Check (A1 or B1)
                var day = rows[0][0];
                if (!day || isNaN(day)) day = rows[0][1]; 
                document.getElementById('dayVal').innerText = day || "0";

                var branchList = [];
                var grandTotal = 0;

                // Loop starts at Row 3 (Index 2)
                for (var i = 2; i < rows.length; i++) {
                    var bName = rows[i][0];
                    
                    // Skip if name is empty or is just the header word "BRANCH"
                    if (!bName || bName.toUpperCase() === "BRANCH" || bName === "") continue;

                    var data = {
                        name: bName,
                        area: rows[i][1] || "N/A",
                        pts: parseInt(rows[i][2]) || 0, // Column C
                        today: rows[i][3] || "0",      // Column D
                        india: rows[i][4] || "0",      // Column E
                        bdesh: rows[i][5] || "0",      // Column F
                        egypt: rows[i][6] || "0"       // Column G
                    };
                    branchList.push(data);
                    grandTotal += data.pts;
                }

                // Sort and Update UI
                branchList.sort(function(a, b) { return b.pts - a.pts; });

                if (branchList.length > 0) {
                    document.getElementById('topBName').innerText = branchList[0].name;
                } else {
                    document.getElementById('topBName').innerText = "No Data";
                }
                
                document.getElementById('totalPoints').innerText = grandTotal.toLocaleString();

                var tbody = document.querySelector("#leaderboard tbody");
                var html = "";
                for (var j = 0; j < branchList.length; j++) {
                    var b = branchList[j];
                    var rowID = "row-" + j;
                    html += '<tr class="branch-row" onclick="toggleDetails(\'' + rowID + '\')">';
                    html += '<td>#' + (j + 1) + '</td>';
                    html += '<td><strong>' + b.name + '</strong></td>';
                    html += '<td>' + b.area + '</td>';
                    html += '<td style="text-align:right;"><strong>' + b.pts + '</strong></td>';
                    html += '</tr>';
                    html += '<tr id="' + rowID + '" class="details-row" style="display:none;">';
                    html += '<td colspan="4"><div class="grid">';
                    html += '<div><span>Today</span><strong>' + b.today + '</strong></div>';
                    html += '<div><span>India</span><strong>' + b.india + '</strong></div>';
                    html += '<div><span>B-Desh</span><strong>' + b.bdesh + '</strong></div>';
                    html += '<div><span>Egypt</span><strong>' + b.egypt + '</strong></div>';
                    html += '</div></td></tr>';
                }
                tbody.innerHTML = html;
            })
            .catch(function(err) {
                console.error("Fetch Error:", err);
            });
    }

    function toggleDetails(id) {
        var element = document.getElementById(id);
        var isHidden = (element.style.display === "none");
        var all = document.querySelectorAll('.details-row');
        for (var k = 0; k < all.length; k++) { all[k].style.display = 'none'; }
        element.style.display = isHidden ? "table-row" : "none";
    }

    refreshData();
</script>
