<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Momentum 2026 Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .header { background: #001f3f; color: #00FFFF; padding: 20px; text-align: center; border-bottom: 4px solid #00FFFF; }
        .stats { display: flex; justify-content: center; padding: 20px; gap: 10px; }
        .card { background: #001f3f; color: white; padding: 15px; border-radius: 8px; min-width: 120px; text-align: center; }
        .card b { display: block; font-size: 24px; color: #39FF14; }
        table { width: 95%; margin: 20px auto; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th { background: #001f3f; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        .details { display: none; background: #eee; padding: 10px; }
    </style>
</head>
<body>

<div class="header"><h1>WIN BACK - MOMENTUM 2026</h1></div>

<div class="stats">
    <div class="card"><span>DAY</span><b id="dayVal">0</b></div>
    <div class="card"><span>TOTAL POINTS</span><b id="totalP">0</b></div>
</div>

<table id="mainTable">
    <thead>
        <tr><th>Rank</th><th>Branch</th><th>Area</th><th style="text-align:right">Points</th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
    // YOUR NEW SHEET ID
    var SHEET_ID = "1gN_nb8Hjggg9hjawsTu8j6WI9sfFqGcZRYYzacjGMaE";
    var DATA_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/export?format=csv&gid=0&t=" + new Date().getTime();

    function loadDashboard() {
        fetch(DATA_URL)
            .then(function(res) { return res.text(); })
            .then(function(csvText) {
                var rows = csvText.split("\n").map(function(row) {
                    return row.split(",").map(function(cell) {
                        return cell.replace(/^"(.*)"$/, "$1").trim();
                    });
                });

                // Set Day Count from A1
                document.getElementById("dayVal").innerText = rows[0][0] || "0";

                var list = [];
                var total = 0;

                // Loop starts at row 3 (Index 2)
                for (var i = 2; i < rows.length; i++) {
                    var name = rows[i][0];
                    if (!name || name.toUpperCase() === "BRANCH") continue;

                    var pts = parseInt(rows[i][2]) || 0; // Column C
                    list.push({
                        name: name,
                        area: rows[i][1] || "",
                        pts: pts,
                        today: rows[i][3] || "0",
                        india: rows[i][4] || "0"
                    });
                    total += pts;
                }

                // Sort by points
                list.sort(function(a, b) { return b.pts - a.pts; });
                document.getElementById("totalP").innerText = total.toLocaleString();

                // Build Table
                var html = "";
                for (var j = 0; j < list.length; j++) {
                    var b = list[j];
                    html += "<tr>";
                    html += "<td>#" + (j + 1) + "</td>";
                    html += "<td><b>" + b.name + "</b></td>";
                    html += "<td>" + b.area + "</td>";
                    html += "<td style='text-align:right'><b>" + b.pts + "</b></td>";
                    html += "</tr>";
                }
                document.getElementById("tableBody").innerHTML = html;
            })
            .catch(function(err) {
                document.body.innerHTML = "<h1>Error loading data</h1><p>" + err + "</p>";
            });
    }

    loadDashboard();
</script>

</body>
</html>
