<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum 2026 - Advanced View</title>
    <style>
        :root { --navy: #001f3f; --neon: #00FFFF; --green: #39FF14; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; color: #333; }
        
        /* Header & Stats */
        .header { background: var(--navy); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--neon); }
        .stats-bar { display: flex; justify-content: center; gap: 15px; padding: 20px; flex-wrap: wrap; }
        .stat-card { background: var(--navy); color: white; padding: 15px; border-radius: 10px; min-width: 150px; text-align: center; border-top: 3px solid var(--neon); }
        .stat-card b { display: block; font-size: 24px; color: var(--green); }

        /* Search Box */
        .search-container { text-align: center; padding: 10px 20px; }
        #branchSearch { 
            width: 90%; max-width: 500px; padding: 12px 20px; border-radius: 25px; 
            border: 2px solid var(--navy); font-size: 16px; outline: none;
        }

        /* Table Styles */
        .content { padding: 0 20px 40px; max-width: 1000px; margin: auto; }
        .table-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--navy); color: white; }
        th, td { padding: 15px; text-align: left; }
        
        .branch-row { cursor: pointer; border-bottom: 1px solid #eee; transition: 0.2s; }
        .branch-row:hover { background: #f0faff; }
        
        /* Corridor View (The Click Action) */
        .corridor-view { display: none; background: #f9f9f9; border-left: 5px solid var(--neon); }
        .corridor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; text-align: center; }
        .corridor-item span { display: block; font-size: 11px; color: #777; text-transform: uppercase; margin-bottom: 5px; }
        .corridor-item strong { font-size: 18px; color: var(--navy); }

        .rank-badge { background: #eee; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <h1>WIN BACK - MOMENTUM 2026</h1>
</div>

<div class="stats-bar">
    <div class="stat-card"><span>CAMPAIGN DAY</span><b id="dayVal">0</b></div>
    <div class="stat-card"><span>TOTAL SCORE</span><b id="totalPoints">0</b></div>
    <div class="stat-card"><span>LEADER</span><b id="topBName">-</b></div>
</div>

<div class="search-container">
    <input type="text" id="branchSearch" placeholder="Search by Branch or Area..." onkeyup="filterTable()">
</div>

<div class="content">
    <div class="table-card">
        <table id="leaderboard">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Branch</th>
                    <th>Area</th>
                    <th style="text-align:right;">Points</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data will load here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    var SHEET_ID = "1gN_nb8Hjggg9hjawsTu8j6WI9sfFqGcZRYYzacjGMaE";
    var DATA_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/export?format=csv&gid=0";

    function fetchData() {
        fetch(DATA_URL + "&t=" + new Date().getTime())
            .then(function(res) { return res.text(); })
            .then(function(csv) {
                var rows = csv.split(/\r?\n/).map(function(r) {
                    return r.split(',').map(function(c) { return c.replace(/^"(.*)"$/, '$1').trim(); });
                });

                document.getElementById('dayVal').innerText = rows[0][0] || "0";

                var list = [];
                var total = 0;

                for (var i = 2; i < rows.length; i++) {
                    var name = rows[i][0];
                    if (!name || name.toUpperCase() === "BRANCH") continue;

                    var pts = parseInt(rows[i][2]) || 0;
                    list.push({
                        name: name,
                        area: rows[i][1] || "N/A",
                        pts: pts,
                        today: rows[i][3] || "0",
                        india: rows[i][4] || "0",
                        bdesh: rows[i][5] || "0",
                        egypt: rows[i][6] || "0"
                    });
                    total += pts;
                }

                list.sort(function(a, b) { return b.pts - a.pts; });
                document.getElementById('totalPoints').innerText = total.toLocaleString();
                if(list.length > 0) document.getElementById('topBName').innerText = list[0].name;

                renderTable(list);
            });
    }

    function renderTable(data) {
        var html = "";
        for (var j = 0; j < data.length; j++) {
            var b = data[j];
            var rowId = "detail-" + j;
            html += '<tr class="branch-row" onclick="toggleCorridor(\'' + rowId + '\')">';
            html += '<td><span class="rank-badge">#' + (j + 1) + '</span></td>';
            html += '<td><strong>' + b.name + '</strong></td>';
            html += '<td>' + b.area + '</td>';
            html += '<td style="text-align:right;"><strong>' + b.pts + '</strong></td>';
            html += '</tr>';
            
            // Corridor View Row
            html += '<tr id="' + rowId + '" class="corridor-view"><td colspan="4">';
            html += '<div class="corridor-grid">';
            html += '<div class="corridor-item"><span>Today</span><strong>' + b.today + '</strong></div>';
            html += '<div class="corridor-item"><span>India</span><strong>' + b.india + '</strong></div>';
            html += '<div class="corridor-item"><span>B-Desh</span><strong>' + b.bdesh + '</strong></div>';
            html += '<div class="corridor-item"><span>Egypt</span><strong>' + b.egypt + '</strong></div>';
            html += '</div></td></tr>';
        }
        document.getElementById("tableBody").innerHTML = html;
    }

    function toggleCorridor(id) {
        var el = document.getElementById(id);
        var isVisible = el.style.display === "table-row";
        
        // Hide all first
        var all = document.querySelectorAll('.corridor-view');
        for (var i = 0; i < all.length; i++) { all[i].style.display = 'none'; }

        el.style.display = isVisible ? "none" : "table-row";
    }

    function filterTable() {
        var input = document.getElementById("branchSearch").value.toLowerCase();
        var rows = document.getElementById("tableBody").getElementsByClassName("branch-row");
        
        for (var i = 0; i < rows.length; i++) {
            var text = rows[i].innerText.toLowerCase();
            rows[i].style.display = text.indexOf(input) > -1 ? "" : "none";
            // Hide detail row if parent is hidden
            var detailId = "detail-" + i;
            if (document.getElementById(detailId)) document.getElementById(detailId).style.display = "none";
        }
    }

    fetchData();
    setInterval(fetchData, 300000); // Auto-refresh every 5 mins
</script>

</body>
</html>
