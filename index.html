<!DOCTYPE html>
<html>
<head>
    <title>A1 Connection Test</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding-top: 100px; 
            background-color: #f4f7f6; 
        }
        .test-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 8px solid #001f3f;
        }
        .label { color: #666; text-transform: uppercase; font-size: 14px; letter-spacing: 2px; }
        .value { 
            font-size: 100px; 
            font-weight: bold; 
            color: #007bff; 
            margin: 20px 0;
        }
        #status { font-size: 12px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="test-card">
        <div class="label">Value in Cell A1</div>
        <div id="display" class="value">...</div>
        <div id="status">Connecting to Google Sheet...</div>
    </div>

<script>
    // Using your confirmed Spreadsheet ID
    var SHEET_ID = "1gN_nb8Hjggg9hjawsTu8j6WI9sfFqGcZRYYzacjGMaE";
    
    // Direct export link for CSV data
    var URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/export?format=csv&gid=0";

    function runTest() {
        var display = document.getElementById('display');
        var status = document.getElementById('status');

        // fetch with a timestamp to prevent the browser from showing old data
        fetch(URL + "&t=" + new Date().getTime())
            .then(function(response) {
                if (!response.ok) throw new Error("Check Share Settings");
                return response.text();
            })
            .then(function(data) {
                // Split the data to get the very first cell (A1)
                var rows = data.split('\n');
                var firstRow = rows[0].split(',');
                var a1Value = firstRow[0].replace(/"/g, "").trim();

                if (a1Value !== "") {
                    display.innerText = a1Value;
                    display.style.color = "#28a745"; // Green for success
                    status.innerText = "Successfully connected to your sheet!";
                } else {
                    display.innerText = "0";
                    status.innerText = "Connected, but Cell A1 is empty.";
                }
            })
            .catch(function(err) {
                display.innerText = "ERR";
                display.style.color = "#dc3545"; // Red for error
                status.innerText = "Error: " + err.message + ". Set sheet to 'Anyone with the link'.";
            });
    }

    runTest();
</script>

</body>
</html>
